version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.api
    container_name: vehicle_tracking_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: vehicle_tracking_postgres
    environment:
      POSTGRES_DB: vehicle_tracking
      POSTGRES_USER: vehicle_user
      POSTGRES_PASSWORD: vehicle_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: vehicle_tracking_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
